name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version tag
        id: tag
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+(\.[0-9]+)?$' | head -1)

          # Commit subjects (first line) and full bodies since the last tag.
          if [ -n "$LATEST" ]; then
            SUBJECTS=$(git log --format="%s" "${LATEST}..HEAD")
            BODIES=$(git log --format="%B" "${LATEST}..HEAD")
          else
            SUBJECTS=$(git log --format="%s")
            BODIES=$(git log --format="%B")
          fi

          # Detect bump level. Precedence: major > minor > patch.
          #   major: [major] token, a "type!:" Conventional-Commit bang, or a
          #          "BREAKING CHANGE" footer.
          #   minor: [minor] token, or a "feat:" / "feat(scope):" commit.
          #   patch: anything else (the default).
          # Explicit [minor]/[major] tokens always override the inferred level.
          BUMP="patch"
          if   echo "$SUBJECTS" | grep -qE '(^| )\[major\]( |$)'; then BUMP="major"
          elif echo "$SUBJECTS" | grep -qE '(^| )\[minor\]( |$)'; then BUMP="minor"
          elif echo "$SUBJECTS" | grep -qE '^[a-z]+(\([^)]+\))?!:' \
               || echo "$BODIES" | grep -qE '^BREAKING CHANGE:'; then BUMP="major"
          elif echo "$SUBJECTS" | grep -qE '^feat(\([^)]+\))?:'; then BUMP="minor"
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

          if [ -z "$LATEST" ]; then
            case "$BUMP" in
              major) NEXT="v1.0.0" ;;
              minor) NEXT="v0.1.0" ;;
              *)     NEXT="v0.0.1" ;;
            esac
          else
            VER="${LATEST#v}"
            MAJOR=$(echo "$VER" | cut -d. -f1)
            MINOR=$(echo "$VER" | cut -d. -f2)
            PATCH=$(echo "$VER" | cut -d. -f3)
            PATCH=${PATCH:-0}
            case "$BUMP" in
              major) NEXT="v$((MAJOR + 1)).0.0" ;;
              minor) NEXT="v${MAJOR}.$((MINOR + 1)).0" ;;
              *)     NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
          fi

          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "prev=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Bump level: $BUMP — next release: $NEXT"

          # Guard: never clobber an existing tag. If the computed tag already
          # exists, a previous run left state behind — fail loudly instead of
          # silently producing a broken or duplicate release.
          if git rev-parse -q --verify "refs/tags/$NEXT" >/dev/null; then
            echo "::error::Computed tag $NEXT already exists — aborting to avoid clobbering it."
            exit 1
          fi

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential nasm binutils xorriso mtools

      - name: Build ESP tree
        run: make all

      - name: Install mtools for USB image
        run: sudo apt-get install -y mtools

      - name: Build USB image
        run: make usb

      - name: Package artifacts
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          mkdir -p dist
          tar -czf dist/aetheros-${TAG}-esp.tar.gz -C build esp
          cp build/kernel/kernel.elf dist/aetheros-${TAG}-kernel.elf
          cp build/BOOTX64.EFI dist/aetheros-${TAG}-BOOTX64.EFI
          gzip -c build/usb.img > dist/aetheros-${TAG}-usb.img.gz

      - name: Build release notes
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          PREV=${{ steps.tag.outputs.prev }}
          BUMP=${{ steps.tag.outputs.bump }}
          if [ -n "$PREV" ]; then
            CHANGES=$(git log --oneline "${PREV}..HEAD" | sed 's/^/- /')
          else
            CHANGES=$(git log --oneline | sed 's/^/- /')
          fi
          [ -z "$CHANGES" ] && CHANGES="- (no changes since last release)"
          case "$BUMP" in
            major) BUMP_LABEL="major" ;;
            minor) BUMP_LABEL="minor feature" ;;
            *)     BUMP_LABEL="patch" ;;
          esac
          {
            echo "## Changes since last release"
            echo ""
            echo "$CHANGES"
            echo ""
            echo "> Version bump: **${BUMP_LABEL}**"
            echo ""
            echo "## Artifacts"
            echo "- \`aetheros-${TAG}-esp.tar.gz\` — full ESP tree (drop into UEFI partition as \`EFI/\`)"
            echo "- \`aetheros-${TAG}-kernel.elf\` — kernel ELF (higher-half, loaded by bootloader)"
            echo "- \`aetheros-${TAG}-BOOTX64.EFI\` — UEFI bootloader application"
            echo "- \`aetheros-${TAG}-usb.img.gz\` — bootable USB image (write with \`dd\` or \`make flash\`)"
          } > dist/notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          gh release create "$TAG" \
            --title "AetherOS $TAG" \
            --notes-file dist/notes.md \
            dist/aetheros-${TAG}-esp.tar.gz \
            dist/aetheros-${TAG}-kernel.elf \
            dist/aetheros-${TAG}-BOOTX64.EFI \
            dist/aetheros-${TAG}-usb.img.gz
