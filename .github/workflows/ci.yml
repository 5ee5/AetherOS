name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential nasm binutils qemu-system-x86 ovmf xorriso mtools
      - name: Check dependencies
        run: ./scripts/check-deps.sh
      - name: Build
        run: make all
      - name: Boot smoke test
        run: BOOT_TEST_TIMEOUT=45s make test
